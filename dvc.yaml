stages:
  preprocess:
    cmd: python preprocess.py
    deps:
      - preprocess.py
    outs:
      - data/train.csv
      - data/test.csv
  train:
    cmd: python train.py
    deps:
      - data/train.csv
      - train.py
    params:
      - train.model_type
      - train.n_estimators
    outs:
      - model.joblib
  validate:
    cmd: python validate.py
    deps:
      - data/test.csv
      - model.joblib
      - validate.py
    metrics:
      - metrics.json:
          cache: false
    plots:
      - predictions.csv:
          template: confusion
          x: actual
          y: predicted